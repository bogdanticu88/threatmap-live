name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # Pulls the pinned threatmap commit from GitHub plus dev tools.
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --cov=threatmap_live --cov-report=term-missing

  smoke:
    name: Packaging smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (no dev extras)
        run: pip install -e .

      - name: Console entry point works
        # No cloud creds in CI, so we only verify the installed command resolves
        # and its help/version render (catches packaging / entry-point breakage).
        run: |
          threatmap-live --version
          threatmap-live --help
          threatmap-live scan-live --help
